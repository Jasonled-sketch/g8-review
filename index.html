<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e131f">
<title>國二五科複習快測</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232f6df6'/%3E%3Ctext x='50' y='66' font-size='48' text-anchor='middle' fill='white' font-family='sans-serif'%3E%E6%B8%AC%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0e131f; --card:#1a2233; --card2:#222c42; --line:#2e3a55;
  --text:#e8edf7; --muted:#93a0bb;
  --accent:#4f8ef7; --good:#3ecf8e; --bad:#f2555a; --warn:#f7b84f;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  font-size:17px; line-height:1.55;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
  max-width:640px; margin:0 auto;
  overflow-x:hidden;
}
main{padding:16px 14px 24px;}
h1{font-size:1.25rem; margin:6px 0 2px;}
h2{font-size:1.1rem; margin:18px 0 10px;}
.sub{color:var(--muted); font-size:.85rem; margin:0 0 14px;}
.hidden{display:none !important;}
button{font:inherit; color:inherit; border:0; cursor:pointer;}

/* 首頁科目卡 */
.subj-grid{display:flex; flex-direction:column; gap:10px;}
.subj-card{
  display:flex; align-items:center; gap:12px;
  background:var(--card); border:2px solid var(--line); border-radius:var(--r);
  padding:12px 14px; min-height:64px; width:100%; text-align:left;
}
.subj-card.sel{border-color:var(--accent); background:var(--card2);}
.subj-card.dead{opacity:.45;}
.subj-dot{width:14px; height:14px; border-radius:50%; flex:none;}
.subj-name{font-size:1.05rem; font-weight:700;}
.subj-meta{margin-left:auto; text-align:right; color:var(--muted); font-size:.8rem; line-height:1.4;}
.subj-check{width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
  flex:none; display:flex; align-items:center; justify-content:center; font-size:.9rem;}
.subj-card.sel .subj-check{background:var(--accent); border-color:var(--accent);}
.btn{
  display:block; width:100%; min-height:52px; border-radius:var(--r);
  background:var(--accent); color:#fff; font-size:1.1rem; font-weight:700;
  padding:12px; margin-top:16px;
}
.btn:disabled{opacity:.4; cursor:default;}
.btn.ghost{background:var(--card); border:2px solid var(--line); color:var(--text);}
.btn.small{min-height:46px; font-size:1rem; margin-top:10px;}

/* 測驗 */
.progress-wrap{height:8px; background:var(--card); border-radius:4px; overflow:hidden; margin:10px 0 4px;}
.progress-bar{height:100%; width:0%; background:var(--accent); transition:width .25s;}
.quiz-top{display:flex; justify-content:space-between; color:var(--muted); font-size:.85rem;}
.q-unit{display:inline-block; background:var(--card2); border-radius:8px;
  padding:2px 10px; font-size:.78rem; color:var(--muted); margin:12px 0 8px;}
.q-text{font-size:1.12rem; font-weight:600; white-space:pre-wrap; word-break:break-word; margin-bottom:14px;}
.opts{display:flex; flex-direction:column; gap:10px;}
.opt{
  background:var(--card); border:2px solid var(--line); border-radius:var(--r);
  padding:12px 14px; min-height:50px; text-align:left; font-size:1rem;
  white-space:pre-wrap; word-break:break-word; display:flex; gap:10px;
}
.opt .tag{color:var(--muted); font-weight:700; flex:none;}
.opt.correct{border-color:var(--good); background:rgba(62,207,142,.12);}
.opt.wrong{border-color:var(--bad); background:rgba(242,85,90,.12);}
.opt:disabled{cursor:default;}
.exp-box{
  background:var(--card); border-left:4px solid var(--warn); border-radius:10px;
  padding:12px 14px; margin-top:14px; font-size:.95rem; white-space:pre-wrap; word-break:break-word;
}
.exp-box .verdict{font-weight:800; margin-bottom:4px;}
.verdict.ok{color:var(--good);} .verdict.ng{color:var(--bad);}

/* 結算 / 回顧 */
.score-card{background:var(--card); border-radius:var(--r); padding:20px; text-align:center; margin-bottom:14px;}
.score-big{font-size:2.6rem; font-weight:800;}
.review-item{background:var(--card); border-radius:var(--r); padding:12px 14px; margin-bottom:10px; font-size:.92rem;}
.review-item .rq{font-weight:600; white-space:pre-wrap; word-break:break-word;}
.review-item .ra{margin-top:6px; white-space:pre-wrap; word-break:break-word;}
.mark-ok{color:var(--good); font-weight:800;} .mark-ng{color:var(--bad); font-weight:800;}

/* 錯題本 / 統計 */
.wrong-item{background:var(--card); border-radius:var(--r); padding:12px 14px; margin-bottom:10px;}
.wrong-item .wq{white-space:pre-wrap; word-break:break-word; font-size:.95rem;}
.pill{display:inline-block; background:var(--card2); border-radius:8px; padding:1px 8px;
  font-size:.75rem; color:var(--muted); margin-right:6px; margin-bottom:4px;}
.stat-row{display:flex; align-items:center; gap:10px; background:var(--card);
  border-radius:var(--r); padding:12px 14px; margin-bottom:8px;}
.stat-row .sname{font-weight:700; width:3.2em;}
.stat-bar{flex:1; height:8px; background:var(--card2); border-radius:4px; overflow:hidden;}
.stat-bar i{display:block; height:100%; background:var(--good);}
.stat-num{color:var(--muted); font-size:.8rem; text-align:right; min-width:7em;}
.empty{color:var(--muted); text-align:center; padding:30px 10px; font-size:.95rem;}
.ver{color:var(--muted); font-size:.75rem; text-align:center; margin-top:22px;}

/* 統計圖表 */
.today-card{
  background:var(--card); border-radius:var(--r); padding:14px 16px;
  font-size:1.02rem; font-weight:700; margin-bottom:4px;
}
.today-card .tc-sub{color:var(--muted); font-size:.82rem; font-weight:400; margin-top:2px;}
.chart-card{background:var(--card); border-radius:var(--r); padding:12px 10px 8px;}
.chart-card svg{display:block; width:100%; height:auto;}
.chart-legend{display:flex; flex-wrap:wrap; gap:6px 14px; padding:8px 6px 4px; font-size:.8rem; color:var(--muted);}
.chart-legend .lg-dot{display:inline-block; width:10px; height:10px; border-radius:3px; margin-right:5px; vertical-align:-1px;}

/* 月曆(v1.3.0) */
.cal{background:var(--card); border-radius:var(--r); padding:10px;}
.cal-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;}
.cal-nav{min-width:44px; min-height:44px; background:var(--card2); border-radius:10px;
  font-size:1.15rem; color:var(--text);}
.cal-title{font-weight:800; font-size:.98rem;}
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:3px;}
.cal-wd{text-align:center; color:var(--muted); font-size:.7rem; padding:2px 0;}
.cal-cell{min-height:48px; background:var(--card2); border-radius:8px; padding:3px 1px 2px;
  display:flex; flex-direction:column; align-items:center; gap:0;
  font-size:.72rem; border:2px solid transparent; line-height:1.15;}
.cal-cell.blank{background:none; border:0;}
.cal-cell.today{border-color:var(--accent);}
.cal-cell.sel{border-color:var(--warn);}
.cal-d{font-size:.76rem; color:var(--muted);}
.cal-ok{color:var(--good); font-weight:700;}
.cal-ng{color:var(--bad); font-weight:700;}
.cal-detail{margin-top:10px; border-top:1px solid var(--line); padding-top:8px;}
.cal-detail-head{font-weight:700; font-size:.9rem; margin-bottom:4px;}
.cal-detail-row{display:flex; gap:10px; padding:5px 0; font-size:.88rem;
  border-bottom:1px solid var(--line);}
.cal-detail-row:last-child{border-bottom:0;}
.cal-detail-row .cdr-name{font-weight:700; width:3.2em; flex:none;}

/* 綜合累積(v1.3.0) */
.seen-card{background:var(--card); border-radius:var(--r); padding:8px 14px;}
.seen-row{display:flex; gap:8px; padding:7px 0; border-bottom:1px solid var(--line);
  font-size:.84rem; align-items:baseline;}
.seen-row:last-child{border-bottom:0;}
.seen-row .sname{font-weight:700; width:3.2em; flex:none;}
.seen-txt{color:var(--muted);}
.seen-total .seen-txt{color:var(--text); font-weight:700;}

/* 今日複習卡(v1.3.0) */
.review-card{background:var(--card); border:2px solid var(--warn); border-radius:var(--r);
  padding:12px 14px; margin-top:12px;}
.review-card .rc-title{font-weight:800; color:var(--warn);}
.review-none{color:var(--muted); font-size:.88rem; background:var(--card);
  border-radius:var(--r); padding:12px 14px; margin-top:12px;}

/* 家長卡隱藏鈕(v1.3.0) */
.kid-hide{background:var(--card); border:1px solid var(--line); border-radius:9px;
  color:var(--muted); font-size:.78rem; padding:10px 14px; min-height:44px; min-width:44px; flex:none;}

/* 登入同步列 */
.auth-bar{display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  min-height:34px; font-size:.78rem; color:var(--muted); margin-bottom:6px;}
.auth-btn{background:var(--card); border:1px solid var(--line); border-radius:9px;
  color:var(--muted); font-size:.78rem; padding:8px 14px; min-height:44px;}
.auth-name{color:var(--text); font-weight:700;}
.auth-status.ok{color:var(--good);} .auth-status.err{color:var(--bad);}

/* 家長儀表板 */
.kid-card{background:var(--card2); border:1px solid var(--line); border-radius:var(--r);
  padding:12px; margin-bottom:14px;}
.kid-card .stat-row{background:var(--card);}
.kid-card .chart-card{background:var(--card); margin-bottom:8px; padding:10px 8px 6px;}
.kid-card .cal{margin-bottom:8px;}
.kid-card .seen-card{margin-bottom:8px;}
.kid-head{display:flex; justify-content:flex-start; align-items:center; gap:8px; margin-bottom:6px;}
.kid-head .kid-upd{margin-left:auto;} /* 名字靠左,更新時間靠右,隱藏鈕排最右 */
.kid-name{font-weight:800; font-size:1.05rem; word-break:break-all;}
.kid-upd{color:var(--muted); font-size:.75rem; flex:none;}
.kid-today{font-size:.9rem; margin-bottom:8px;}

/* 底部導覽 */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:10;
  display:flex; background:#131a2a; border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
  max-width:640px; margin:0 auto;
}
nav button{
  flex:1; background:none; color:var(--muted); min-height:60px;
  font-size:.85rem; display:flex; flex-direction:column; gap:2px; align-items:center; justify-content:center;
}
nav button.on{color:var(--accent); font-weight:700;}
nav .ico{font-size:1.25rem; line-height:1;}
</style>
</head>
<body>

<main>
  <!-- 首頁 -->
  <section id="view-home">
    <div class="auth-bar" id="authBar"></div>
    <h1>國二五科複習快測</h1>
    <p class="sub">勾選科目,隨機抽 10 題快速測驗</p>
    <div class="subj-grid" id="subjGrid"></div>
    <button class="btn" id="btnStart">開始快測</button>
    <div id="reviewBox"></div>
  </section>

  <!-- 測驗 -->
  <section id="view-quiz" class="hidden">
    <div class="quiz-top"><span id="quizProg"></span><span id="quizTimer">0:00</span></div>
    <div class="progress-wrap"><div class="progress-bar" id="quizBar"></div></div>
    <div class="q-unit" id="quizUnit"></div>
    <div class="q-text" id="quizQ"></div>
    <div class="opts" id="quizOpts"></div>
    <div class="exp-box hidden" id="quizExp"></div>
    <button class="btn hidden" id="btnNext">下一題</button>
    <button class="btn ghost small" id="btnQuit">中止測驗</button>
  </section>

  <!-- 結算 -->
  <section id="view-result" class="hidden">
    <h1>測驗結果</h1>
    <div class="score-card">
      <div class="score-big" id="resScore"></div>
      <div class="sub" id="resMeta"></div>
    </div>
    <button class="btn" id="btnAgain">再測一次</button>
    <button class="btn ghost small" id="btnHome2">回首頁</button>
    <h2>逐題回顧</h2>
    <div id="resReview"></div>
  </section>

  <!-- 錯題本 -->
  <section id="view-wrong" class="hidden">
    <h1>錯題本</h1>
    <p class="sub">答錯自動收錄;按 1→3→7→14 天間隔複習,連過四關自動畢業移出</p>
    <button class="btn" id="btnRetestWrong">重測錯題</button>
    <div id="wrongList" style="margin-top:14px"></div>
  </section>

  <!-- 統計 -->
  <section id="view-stats" class="hidden">
    <h1>學習統計</h1>
    <div class="today-card" id="statToday"></div>
    <h2>近 14 天每日答題</h2>
    <div class="chart-card" id="chartDaily"></div>
    <h2>月曆(每日答對/答錯)</h2>
    <div id="calStats"></div>
    <h2>綜合累積</h2>
    <div id="statSeen"></div>
    <h2>正確率趨勢(近 14 天)</h2>
    <div class="chart-card" id="chartTrend"></div>
    <h2>科目答題分布</h2>
    <div class="chart-card" id="chartSubj"></div>
    <h2>各科表現</h2>
    <div id="statSubj"></div>
    <h2>最弱單元(答過 ≥3 題)</h2>
    <div id="statWeak"></div>
    <div class="ver" id="verLine"></div>
  </section>

  <!-- 家長儀表板(僅家長帳號登入時出現) -->
  <section id="view-parent" class="hidden">
    <h1>家長儀表板</h1>
    <p class="sub">孩子們的雲端學習紀錄</p>
    <button class="btn ghost small" id="btnParentRefresh">重新整理</button>
    <div id="parentList" style="margin-top:14px"></div>
  </section>
</main>

<nav>
  <button data-tab="home" class="on"><span class="ico">&#127968;</span>首頁</button>
  <button data-tab="wrong"><span class="ico">&#128213;</span>錯題本</button>
  <button data-tab="stats"><span class="ico">&#128202;</span>統計</button>
  <button data-tab="parent" id="navParent" class="hidden"><span class="ico">&#128106;</span>家長</button>
</nav>

<!-- 題庫(缺檔時該科自動停用,App 其餘功能照常) -->
<script src="data/chinese.js"></script>
<script src="data/english.js"></script>
<script src="data/math.js"></script>
<script src="data/science.js"></script>
<script src="data/social.js"></script>

<script>
'use strict';
const APP_VERSION = '1.3.0';
const LS_KEY = 'g8review_v1';

/*CORE-START*/
const Core = {
  newStore(){ return { v:1, subj:{}, unit:{}, wrong:{}, days:{}, wrongGone:{}, seen:{} }; },
  /* 間隔複習排程(v1.3.0):stage 0-3 → 下次複習 +1/+3/+7/+14 天,四關畢業 */
  SCHEDULE: [1, 3, 7, 14],
  DUE_RE: /^\d{4}-\d{2}-\d{2}$/,
  // YYYY-MM-DD 加 n 天(本地時區)
  addDays(dateStr, n){
    const p = String(dateStr).split('-').map(Number);
    return Core.localDate(new Date(p[0], p[1] - 1, p[2] + n));
  },
  // 當地日期字串 YYYY-MM-DD(本地時區,不用 toISOString 以免跨日誤差)
  localDate(d){
    d = d || new Date();
    const p = function(n){ return String(n).padStart(2, '0'); };
    return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate());
  },
  // 取近 n 天(含今日)序列,舊→新;每天 {date, m, d, a, c},無紀錄補 0
  lastNDays(store, n, base){
    base = base || new Date();
    const days = store.days || {};
    const out = [];
    for(let i = n - 1; i >= 0; i--){
      const d = new Date(base.getFullYear(), base.getMonth(), base.getDate() - i);
      const key = Core.localDate(d);
      const rec = days[key];
      out.push({ date:key, m:d.getMonth() + 1, d:d.getDate(),
                 a:rec ? (rec.a || 0) : 0, c:rec ? (rec.c || 0) : 0 });
    }
    return out;
  },
  // 題幹短 hash(djb2 → 36 進位),題庫增刪題也不會錯位
  qhash(str){
    str = String(str);
    let h = 5381;
    for(let i = 0; i < str.length; i++){
      h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
    }
    return h.toString(36);
  },
  // Fisher-Yates 抽 n 題(不足全出)
  pick(pool, n, rand){
    rand = rand || Math.random;
    const arr = pool.slice();
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr.slice(0, Math.min(n, arr.length));
  },
  // 把勾選科目攤平成題池,每題帶穩定 id
  buildPool(qb, keys){
    const pool = [];
    keys.forEach(function(k){
      const s = qb[k];
      if(!s || !Array.isArray(s.units)) return;
      s.units.forEach(function(u){
        (u.questions || []).forEach(function(q){
          if(!q || !Array.isArray(q.options) || q.options.length !== 4) return;
          if(typeof q.a !== 'number' || q.a < 0 || q.a > 3) return;
          pool.push({ id: k + '|' + u.id + '|' + Core.qhash(q.q), subj: k, subjName: s.subject,
                      unitId: u.id, unitName: u.name, semester: u.semester, q: q });
        });
      });
    });
    return pool;
  },
  // 記一筆作答:科別/單元統計 + 每日紀錄 + 逐題累積(seen)+ 錯題間隔複習排程(v1.3.0)
  //   答錯:stage=0,due=明天(既有條目再錯也 reset)
  //   答對且在錯題本:stage+1;滿四關畢業移出(留墓碑),否則 due=今天+SCHEDULE[新stage]
  // date 可省略,預設當地今日(YYYY-MM-DD),due 以其為基準
  record(store, item, correct, date){
    const s = store.subj[item.subj] || (store.subj[item.subj] = { a:0, c:0 });
    s.a++; if(correct) s.c++;
    if(!store.days) store.days = {};
    const dk = date || Core.localDate();
    const day = store.days[dk] || (store.days[dk] = { a:0, c:0, subj:{} });
    day.a++; if(correct) day.c++;
    const ds = day.subj[item.subj] || (day.subj[item.subj] = { a:0, c:0 });
    ds.a++; if(correct) ds.c++;
    const u = store.unit[item.unitId] || (store.unit[item.unitId] = { a:0, c:0, s:item.subj });
    u.a++; if(correct) u.c++;
    if(!store.seen) store.seen = {};
    const sn = store.seen[item.id] || (store.seen[item.id] = { a:0, c:0 });
    sn.a++; if(correct) sn.c++;
    if(correct){
      const w = store.wrong[item.id];
      /* 只有「到期」的答對才晉級;未到期被隨機抽中答對不動狀態,維持遺忘間隔 */
      if(w && (typeof w.due !== 'string' || w.due <= dk)){
        const st = (typeof w.stage === 'number' ? w.stage : 0) + 1;
        if(st >= Core.SCHEDULE.length){
          delete store.wrong[item.id];
          if(!store.wrongGone) store.wrongGone = {};
          store.wrongGone[item.id] = Date.now(); /* 墓碑:合併時壓過另一裝置的舊錯題 */
        } else {
          w.stage = st;
          w.due = Core.addDays(dk, Core.SCHEDULE[st]);
          w.t = Date.now(); /* 過關進度也算最新狀態,合併時才不會被舊紀錄壓回 */
        }
      }
    } else {
      store.wrong[item.id] = { stage:0, due:Core.addDays(dk, Core.SCHEDULE[0]), t:Date.now() };
    }
  },
  // 到期複習題 id 清單(due <= today;缺 due 視同到期)
  dueWrongIds(store, today){
    today = today || Core.localDate();
    return Object.keys(store.wrong || {}).filter(function(id){
      const w = store.wrong[id];
      return !!w && (typeof w.due !== 'string' || w.due <= today);
    });
  },
  // 舊存檔就地遷移(v1.3.0):wrong 連對制(k)→ 間隔複習制(stage/due=明天);補 seen
  migrateStore(s){
    if(!s || typeof s !== 'object') return s;
    if(!s.seen) s.seen = {};
    const w = s.wrong || {};
    const tomorrow = Core.addDays(Core.localDate(), 1);
    Object.keys(w).forEach(function(id){
      const e = w[id];
      if(!e || typeof e !== 'object') return;
      if(typeof e.stage !== 'number'){
        e.stage = Math.min(Math.max(Math.floor(Number(e.k) || 0), 0), 3);
        e.due = tomorrow;
        delete e.k;
      }
      if(typeof e.due !== 'string' || !Core.DUE_RE.test(e.due)) e.due = tomorrow;
    });
    return s;
  },
  // 綜合累積(v1.3.0):totals={科key:總題數};回傳各科 {seen,total,once,att,cor,rate}
  seenStats(store, totals, validIds){
    const out = {};
    Object.keys(totals || {}).forEach(function(k){
      out[k] = { seen:0, total:totals[k] || 0, once:0, att:0, cor:0, rate:null };
    });
    const seen = store.seen || {};
    Object.keys(seen).forEach(function(id){
      if(validIds && !validIds.has(id)) return; /* 濾掉題庫已不存在的題號,避免統計膨脹 */
      const r = out[id.split('|')[0]];
      const s = seen[id];
      if(!r || !s) return;
      r.seen++;
      if((s.c || 0) > 0) r.once++;
      r.att += s.a || 0; r.cor += s.c || 0;
    });
    Object.keys(out).forEach(function(k){
      const r = out[k];
      if(r.att) r.rate = Math.round(100 * r.cor / r.att);
    });
    return out;
  },
  CAL_SUBJ: [['chinese','國文'],['english','英文'],['math','數學'],['science','自然'],['social','社會']],
  // 月曆視圖(v1.3.0,純函式):y=西元年、m=1-12;sel=展開明細的 YYYY-MM-DD;today 可注入供測試
  // 週一起始;每日格:日期 + 綠答對數/紅答錯數;今日框線高亮
  renderCalendar(store, y, m, sel, today){
    today = today || Core.localDate();
    const days = (store && store.days) || {};
    const p2 = function(n){ return String(n).padStart(2, '0'); };
    let h = '<div class="cal">';
    h += '<div class="cal-head">' +
      '<button class="cal-nav" data-cal="prev" aria-label="上個月">&#8249;</button>' +
      '<span class="cal-title">' + y + ' 年 ' + m + ' 月</span>' +
      '<button class="cal-nav" data-cal="next" aria-label="下個月">&#8250;</button></div>';
    h += '<div class="cal-grid">';
    ['一','二','三','四','五','六','日'].forEach(function(w){ h += '<span class="cal-wd">' + w + '</span>'; });
    const lead = (new Date(y, m - 1, 1).getDay() + 6) % 7; /* 週一起始 */
    for(let i = 0; i < lead; i++) h += '<span class="cal-cell blank"></span>';
    const dim = new Date(y, m, 0).getDate();
    for(let d = 1; d <= dim; d++){
      const key = y + '-' + p2(m) + '-' + p2(d);
      const rec = days[key];
      const a = rec ? (rec.a || 0) : 0, c = rec ? (rec.c || 0) : 0;
      let cls = 'cal-cell';
      if(key === today) cls += ' today';
      if(key === sel) cls += ' sel';
      h += '<button class="' + cls + '" data-date="' + key + '"><span class="cal-d">' + d + '</span>' +
        (a > 0 ? '<span class="cal-ok">' + c + '</span><span class="cal-ng">' + (a - c) + '</span>' : '') +
        '</button>';
    }
    h += '</div>';
    if(sel){
      const rec = days[sel];
      const sp = sel.split('-');
      h += '<div class="cal-detail"><div class="cal-detail-head">' + Number(sp[1]) + '/' + Number(sp[2]) + ' 各科明細</div>';
      let any = false;
      if(rec && rec.subj){
        Core.CAL_SUBJ.forEach(function(pair){
          const s = rec.subj[pair[0]];
          if(!s || !s.a) return;
          any = true;
          h += '<div class="cal-detail-row"><span class="cdr-name">' + pair[1] + '</span>' +
            '<span>答對 <b class="cal-ok">' + (s.c || 0) + '</b>.答錯 <b class="cal-ng">' + (s.a - (s.c || 0)) + '</b></span></div>';
        });
      }
      if(!any){
        h += '<div class="cal-detail-row" style="color:var(--muted)">' +
          (rec && rec.a ? '此日僅有總數(舊資料無科目明細)' : '這天沒有作答紀錄') + '</div>';
      }
      h += '</div>';
    }
    h += '</div>';
    return h;
  },
  subjectStats(store, key){
    const s = store.subj[key];
    if(!s || !s.a) return { a:0, c:0, rate:null };
    return { a:s.a, c:s.c, rate:Math.round(100 * s.c / s.a) };
  },
  // 最弱單元:答過 >= min 題、依錯誤率排序,取前 3
  weakUnits(store, min){
    if(min == null) min = 3;
    const out = [];
    Object.keys(store.unit).forEach(function(id){
      const u = store.unit[id];
      if(u.a >= min && u.a > u.c){
        out.push({ id:id, s:u.s, a:u.a, c:u.c, err:(u.a - u.c) / u.a });
      }
    });
    out.sort(function(x, y){ return y.err - x.err || y.a - x.a; });
    return out.slice(0, 3);
  },
  /* --- 雲端同步(v1.2.1) --- */
  // 逐 key 合併兩個 {key:{a,c,...}} 統計表:同 key 取答題數 a 較大的一邊,a 相同取 c 較大者
  mergeMapByA(m1, m2){
    m1 = m1 || {}; m2 = m2 || {};
    const out = {};
    Object.keys(m1).forEach(function(k){ if(m1[k]) out[k] = m1[k]; });
    Object.keys(m2).forEach(function(k){
      if(!m2[k]) return;
      if(!(k in out)){ out[k] = m2[k]; return; }
      const a1 = out[k].a || 0, a2 = m2[k].a || 0;
      if(a2 > a1 || (a2 === a1 && (m2[k].c || 0) > (out[k].c || 0))) out[k] = m2[k];
    });
    return out;
  },
  // 二選一:取 a 較大者,tie 取 c 大者(x/y 可為 null)
  pickByA(x, y){
    if(!x) return y || null;
    if(!y) return x;
    const xa = x.a || 0, ya = y.a || 0;
    if(ya > xa) return y;
    if(ya === xa && (y.c || 0) > (x.c || 0)) return y;
    return x;
  },
  WRONG_GONE_TTL: 90 * 24 * 3600 * 1000, // 墓碑保留 90 天
  // 本地/雲端存檔合併(純函式,回傳全新深拷貝):
  //   days:逐日逐科取 a 大者(tie 取 c),日層級 a/c 由各科加總重算
  //   subj:由合併後 days 重算,確保每日圖與各科總表一致
  //   unit:逐 key 取 a 大者(已知有損,可接受)
  //   wrong:聯集,同 id 取 t 較新者且 k 取大值;wrongGone 墓碑壓過復活、90 天修剪
  // 任一邊為 null/缺欄位皆可,mergeStores(s, null) 亦可當 normalize+deep clone 用
  mergeStores(local, cloud){
    const L = local || {}, C = cloud || {};
    /* days:逐日合併 */
    const days = {};
    let subjLossy = false;
    const ld = L.days || {}, cd = C.days || {};
    const dayKeys = {};
    Object.keys(ld).forEach(function(k){ if(ld[k]) dayKeys[k] = 1; });
    Object.keys(cd).forEach(function(k){ if(cd[k]) dayKeys[k] = 1; });
    Object.keys(dayKeys).forEach(function(k){
      const dl = ld[k] || null, dc = cd[k] || null;
      const subjKeys = {};
      if(dl && dl.subj) Object.keys(dl.subj).forEach(function(x){ if(dl.subj[x]) subjKeys[x] = 1; });
      if(dc && dc.subj) Object.keys(dc.subj).forEach(function(x){ if(dc.subj[x]) subjKeys[x] = 1; });
      const subj = {};
      let dA = 0, dC = 0;
      Object.keys(subjKeys).forEach(function(x){
        const rec = Core.pickByA(dl && dl.subj ? dl.subj[x] : null, dc && dc.subj ? dc.subj[x] : null);
        if(!rec) return;
        subj[x] = { a: rec.a || 0, c: rec.c || 0 };
        dA += subj[x].a; dC += subj[x].c;
      });
      if(Object.keys(subj).length){
        days[k] = { a: dA, c: dC, subj: subj };
      } else { /* 舊格式(無 subj 明細)退回整日取 a 大者 */
        const rec = Core.pickByA(dl, dc);
        days[k] = { a: (rec && rec.a) || 0, c: (rec && rec.c) || 0, subj: {} };
        if(((rec && rec.a) || 0) > 0) subjLossy = true;
      }
    });
    /* subj:由合併後 days 重算,保證與每日圖一致;
       若有舊格式日資料(無科目明細),重算會漏,退回逐科取大 */
    let subj = {};
    Object.keys(days).forEach(function(k){
      const ds = days[k].subj || {};
      Object.keys(ds).forEach(function(x){
        const s = subj[x] || (subj[x] = { a:0, c:0 });
        s.a += ds[x].a || 0; s.c += ds[x].c || 0;
      });
    });
    if(subjLossy) subj = Core.mergeMapByA(L.subj, C.subj);
    /* seen(v1.3.0):逐 key a 取大、c 取大後夾 <= a(避免任一裝置進度回退) */
    const seen = {};
    const lsn = L.seen || {}, csn = C.seen || {};
    const seenKeys = {};
    Object.keys(lsn).forEach(function(k){ if(lsn[k]) seenKeys[k] = 1; });
    Object.keys(csn).forEach(function(k){ if(csn[k]) seenKeys[k] = 1; });
    Object.keys(seenKeys).forEach(function(k){
      const x = lsn[k] || {}, y = csn[k] || {};
      const a = Math.max(x.a || 0, y.a || 0);
      seen[k] = { a: a, c: Math.min(Math.max(x.c || 0, y.c || 0), a) };
    });
    /* wrong:聯集;同 id 取「t 較新」那邊的 stage/due(最新事件優先——
       答錯 reset 必須壓過另一裝置的舊高關數,否則間隔複習狀態機被破壞) */
    const wrong = {};
    const lw = L.wrong || {}, cw = C.wrong || {};
    Object.keys(lw).forEach(function(k){
      if(lw[k]) wrong[k] = { stage: lw[k].stage || 0, due: lw[k].due || '', t: lw[k].t || 0 };
    });
    Object.keys(cw).forEach(function(k){
      const w2 = cw[k];
      if(!w2) return;
      if(!(k in wrong)){ wrong[k] = { stage: w2.stage || 0, due: w2.due || '', t: w2.t || 0 }; return; }
      const w1 = wrong[k];
      const newer = ((w2.t || 0) > (w1.t || 0)) ? w2 : w1;
      wrong[k] = { stage: newer.stage || 0, due: newer.due || '', t: Math.max(w1.t || 0, w2.t || 0) };
    });
    Object.keys(wrong).forEach(function(k){
      if(!Core.DUE_RE.test(wrong[k].due)) wrong[k].due = Core.localDate();
    });
    /* wrongGone:聯集取新;墓碑比錯題新 → 錯題不進合併結果;逾 90 天修剪 */
    const wrongGone = {};
    const lg = L.wrongGone || {}, cg = C.wrongGone || {};
    const now = Date.now();
    [lg, cg].forEach(function(g){
      Object.keys(g).forEach(function(k){
        const t = Number(g[k]) || 0;
        if(t <= 0 || now - t > Core.WRONG_GONE_TTL) return;
        if(!(k in wrongGone) || t > wrongGone[k]) wrongGone[k] = t;
      });
    });
    Object.keys(wrongGone).forEach(function(k){
      if(wrong[k] && wrongGone[k] > (wrong[k].t || 0)) delete wrong[k];
    });
    return JSON.parse(JSON.stringify({
      v: 1,
      subj: subj,
      unit: Core.mergeMapByA(L.unit, C.unit),
      days: days,
      seen: seen,
      wrong: wrong,
      wrongGone: wrongGone
    }));
  },
  // 雲端資料白名單重建(防 XSS/污染):只保留已知欄位,數值強制合法化
  //   計數欄(a,c,k)上限 1e7;時間戳欄(t,removedAt)上限 1e13;c 超過 a 時夾回 a
  sanitizeStore(raw){
    const MAX_CNT = 1e7, MAX_TS = 1e13, MAX_KEY = 80;
    const num = function(v, max){
      v = Number(v);
      if(typeof v !== 'number' || !isFinite(v) || v < 0) return 0;
      return Math.min(Math.floor(v), max);
    };
    const okKey = function(k){ return typeof k === 'string' && k.length > 0 && k.length <= MAX_KEY; };
    const src = (raw && typeof raw === 'object') ? raw : {};
    const out = { v:1, subj:{}, unit:{}, days:{}, seen:{}, wrong:{}, wrongGone:{} };
    const cleanAC = function(rec){
      if(!rec || typeof rec !== 'object') return null;
      const a = num(rec.a, MAX_CNT);
      const c = Math.min(num(rec.c, MAX_CNT), a);
      return { a: a, c: c };
    };
    const eachKey = function(m, fn){
      if(!m || typeof m !== 'object') return;
      Object.keys(m).forEach(function(k){ if(okKey(k)) fn(k, m[k]); });
    };
    eachKey(src.subj, function(k, v){
      const r = cleanAC(v); if(r) out.subj[k] = r;
    });
    eachKey(src.unit, function(k, v){
      const r = cleanAC(v);
      if(!r) return;
      if(v && typeof v.s === 'string' && v.s.length <= MAX_KEY) r.s = v.s;
      out.unit[k] = r;
    });
    eachKey(src.days, function(k, v){
      const r = cleanAC(v);
      if(!r) return;
      const subj = {};
      eachKey(v.subj, function(sk, sv){
        const sr = cleanAC(sv); if(sr) subj[sk] = sr;
      });
      out.days[k] = { a: r.a, c: r.c, subj: subj };
    });
    eachKey(src.seen, function(k, v){
      const r = cleanAC(v); if(r) out.seen[k] = r;
    });
    eachKey(src.wrong, function(k, v){
      if(!v || typeof v !== 'object') return;
      /* stage:0-3 整數;舊 k 制(無 stage)以 min(k,3) 遷移 */
      let stage = Number(v.stage);
      if(v.stage == null && v.k != null) stage = Math.min(num(v.k, MAX_CNT), 3);
      if(typeof stage !== 'number' || !isFinite(stage)) stage = 0;
      stage = Math.min(Math.max(Math.floor(stage), 0), 3);
      /* due:YYYY-MM-DD,不合法一律設今天(視同到期) */
      const due = (typeof v.due === 'string' && Core.DUE_RE.test(v.due)) ? v.due : Core.localDate();
      out.wrong[k] = { stage: stage, due: due, t: num(v.t, MAX_TS) };
    });
    eachKey(src.wrongGone, function(k, v){
      const t = num(v, MAX_TS);
      if(t > 0 && Date.now() - t <= Core.WRONG_GONE_TTL) out.wrongGone[k] = t;
    });
    /* 墓碑一致性:比錯題紀錄新的墓碑壓掉該錯題(useCloud/家長卡路徑不經 mergeStores) */
    Object.keys(out.wrongGone).forEach(function(k){
      if(out.wrong[k] && out.wrongGone[k] > (out.wrong[k].t || 0)) delete out.wrong[k];
    });
    return out;
  },
  // 登入時同步決策(純函式):
  //   cloud 不存在            → upload(把本地傳上去)
  //   雲端較新且本地無新作答  → useCloud(採雲端)
  //   雲端不比上次同步新      → 本地較新則 upload,否則 none
  //   兩邊都有新資料(衝突)  → merge(mergeStores 合併後上傳)
  // localDirty=本地自上次同步後有變動;cloudUpdatedAt/lastSyncAt=毫秒數
  resolveSync(local, cloud, localDirty, cloudUpdatedAt, lastSyncAt){
    if(!cloud) return { action:'upload', store: local };
    const cloudNewer = (cloudUpdatedAt || 0) > (lastSyncAt || 0);
    /* useCloud 用 sanitizeStore 當 normalize+深拷貝,不走 mergeStores 以免 subj 被 days 重算掉舊歷史 */
    if(cloudNewer && !localDirty) return { action:'useCloud', store: Core.sanitizeStore(cloud) };
    if(!cloudNewer) return { action: localDirty ? 'upload' : 'none', store: local };
    return { action:'merge', store: Core.mergeStores(local, cloud) };
  }
};
if (typeof module !== 'undefined' && module.exports){ module.exports = Core; }
/*CORE-END*/

/* ---------- 雲端同步層(v1.2.0) ----------
   adapter 由頁尾 Firebase module script 注入(依賴注入,測試可換 mock):
   { onAuth(cb), signIn(), signOut(), fetchDoc(id), saveDoc(id,payload), listDocs() }
   SDK 載入失敗(離線)→ setOffline(),App 其餘功能完全不受影響 */
const PARENT_EMAILS = ['covernself@gmail.com'];
const SYNC_LS_KEY = 'g8review_sync_v1';
const Sync = {
  adapter: null, user: null, offline: false, timer: 0,
  seq: 0, inFlight: false, pending: false,   // 上傳競態防護:變動序號 + 同時只跑一個上傳
  status: { state:'idle', msg:'' },   // idle|syncing|ok|error
  meta: (function(){
    try{
      const m = JSON.parse(localStorage.getItem(SYNC_LS_KEY));
      if(m && typeof m === 'object'){
        return { lastSyncAt: m.lastSyncAt || 0, dirty: !!m.dirty,
                 ownerUid: (typeof m.ownerUid === 'string') ? m.ownerUid : '' };
      }
    }catch(e){}
    return { lastSyncAt: 0, dirty: false, ownerUid: '' };
  })(),
  saveMeta(){ try{ localStorage.setItem(SYNC_LS_KEY, JSON.stringify(Sync.meta)); }catch(e){} },
  // 本地有新變動:序號 +1、標記 dirty + 排程 3 秒 debounce 上傳
  markDirty(){ Sync.seq++; Sync.meta.dirty = true; Sync.saveMeta(); Sync.scheduleUpload(); },
  setOffline(){ Sync.offline = true; Sync.adapter = null; renderAuthBar(); },
  setStatus(state, msg){ Sync.status = { state: state, msg: msg || '' }; renderAuthBar(); },
  errMsg(err){
    if(!err) return '未知錯誤';
    return String(err.code || err.message || err).slice(0, 80);
  },
  tsToMs(v){
    if(!v) return 0;
    if(typeof v === 'number') return v;
    if(typeof v.toMillis === 'function'){ try{ return v.toMillis(); }catch(e){} }
    if(typeof v.seconds === 'number') return v.seconds * 1000;
    return 0;
  },
  isParent(){ return !!(Sync.user && PARENT_EMAILS.indexOf(Sync.user.email) >= 0); },
  /* 文件 id = uid 本身(Firestore 規則 match /g8review/{userId} 以 uid 比對) */
  docId(){ return Sync.user ? Sync.user.uid : ''; },
  init(adapter){
    Sync.adapter = adapter; Sync.offline = false;
    adapter.onAuth(function(user){
      Sync.user = user;
      if(!user){
        /* 登出:只清計時器;dirty 保留,同帳號下次登入才會補傳未上傳的作答 */
        clearTimeout(Sync.timer); Sync.timer = 0;
        Sync.pending = false;
        Sync.saveMeta();
        /* error 狀態保留(如 redirect 登入失敗),讓未登入列看得到錯誤代碼 */
        if(Sync.status.state !== 'error') Sync.status = { state:'idle', msg:'' };
      }
      renderAuthBar();
      updateParentTab();
      if(user) Sync.onLogin();
    });
    renderAuthBar();
  },
  // 登入成功:抓雲端 doc → resolveSync 決策 → 採雲端 / 上傳 / 合併後上傳
  // 若本地資料屬於別的帳號(ownerUid 不同):不上傳本地,備份後改採當前帳號的雲端資料
  async onLogin(){
    try{
      Sync.setStatus('syncing');
      const uid = Sync.user.uid;
      if(Sync.meta.ownerUid && Sync.meta.ownerUid !== uid){
        clearTimeout(Sync.timer); Sync.timer = 0; Sync.pending = false;
        try{ localStorage.setItem(LS_KEY + '_backup_' + Sync.meta.ownerUid, JSON.stringify(store)); }catch(e){}
        const doc0 = await Sync.adapter.fetchDoc(Sync.docId());
        const cs0 = (doc0 && doc0.store && typeof doc0.store === 'object') ? Core.sanitizeStore(doc0.store) : null;
        store = cs0 || Core.newStore(); /* sanitizeStore 已是全新白名單物件,直接採用 */
        Sync.meta = { ownerUid: uid, dirty: false,
                      lastSyncAt: doc0 ? (Sync.tsToMs(doc0.updatedAt) || Date.now()) : 0 };
        Sync.saveMeta();
        saveStore({ silent: true });
        rerenderAll();
        Sync.setStatus('ok');
        return;
      }
      if(Sync.meta.ownerUid !== uid){ Sync.meta.ownerUid = uid; Sync.saveMeta(); }
      const cloudDoc = await Sync.adapter.fetchDoc(Sync.docId());
      const cloudStore = (cloudDoc && cloudDoc.store && typeof cloudDoc.store === 'object')
        ? Core.sanitizeStore(cloudDoc.store) : null;
      const cloudUpdatedAt = cloudDoc ? Sync.tsToMs(cloudDoc.updatedAt) : 0;
      const r = Core.resolveSync(store, cloudStore, Sync.meta.dirty, cloudUpdatedAt, Sync.meta.lastSyncAt);
      if(r.action === 'useCloud' || r.action === 'merge'){
        store = r.store;
        saveStore({ silent: true });
        rerenderAll();
      }
      if(r.action === 'useCloud'){
        Sync.meta.dirty = false;
        Sync.meta.lastSyncAt = cloudUpdatedAt || Date.now();
        Sync.saveMeta();
        Sync.setStatus('ok');
      } else if(r.action === 'none'){
        Sync.setStatus('ok');
      } else { // upload | merge
        await Sync.uploadNow();
      }
    }catch(err){
      Sync.setStatus('error', Sync.errMsg(err));
    }
  },
  scheduleUpload(){
    if(!Sync.user || !Sync.adapter) return;
    clearTimeout(Sync.timer);
    Sync.timer = setTimeout(function(){ Sync.uploadNow(); }, 3000);
  },
  // 競態防護:inFlight 時只標記 pending 不並發;上傳期間又有變動(seq 前進)則不清 dirty、立即補傳
  async uploadNow(){
    if(!Sync.user || !Sync.adapter) return;
    if(Sync.inFlight){ Sync.pending = true; return; }
    clearTimeout(Sync.timer); Sync.timer = 0;
    Sync.inFlight = true;
    const uploadingSeq = Sync.seq;
    try{
      Sync.setStatus('syncing');
      const payload = {
        app: 'g8review',
        name: Sync.user.displayName || '',   // 個資最小化:不上傳 email(uid 已是 doc id)
        updatedAt: Date.now(),
        store: store
      };
      await Sync.adapter.saveDoc(Sync.docId(), payload);
      Sync.meta.lastSyncAt = payload.updatedAt;
      if(uploadingSeq === Sync.seq){
        Sync.meta.dirty = false;
        Sync.saveMeta();
        Sync.setStatus('ok');
      } else {
        Sync.saveMeta();
        Sync.pending = true; /* 上傳期間又有新變動 → 保持 dirty,立即再傳 */
      }
    }catch(err){
      Sync.setStatus('error', Sync.errMsg(err));
    }finally{
      Sync.inFlight = false;
      if(Sync.pending){ Sync.pending = false; Sync.uploadNow(); }
    }
  }
};

const SUBJECTS = [

function subjLoaded(k){
  return !!(QB[k] && Array.isArray(QB[k].units) &&
    QB[k].units.some(u => (u.questions || []).length > 0));
}
function loadStore(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){
      const s = JSON.parse(raw);
      if(s && s.v === 1){
        if(!s.days) s.days = {}; /* 舊資料(v1 無 days)就地升級,錯題本與統計不動 */
        if(!s.wrongGone) s.wrongGone = {}; /* v1.2.1 起的錯題墓碑欄位 */
        return Core.migrateStore(s); /* v1.3.0:wrong k 制→stage/due、補 seen */
      }
    }
  }catch(e){}
  return Core.newStore();
}
/* opts.silent = 採用雲端資料等系統性寫入,不標記 dirty、不觸發上傳 */
function saveStore(opts){
  try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){}
  if(!(opts && opts.silent)) Sync.markDirty();
}

/* 用 id 反查題目(給錯題本用) */
function resolveQ(id){
  const p = id.split('|');
  if(p.length !== 3) return null;
  const s = QB[p[0]];
  if(!s || !Array.isArray(s.units)) return null;
  const u = s.units.find(x => x.id === p[1]);
  if(!u) return null;
  const q = (u.questions || []).find(x => x && Core.qhash(x.q) === p[2]);
  if(!q) return null;
  return { id:id, subj:p[0], subjName:s.subject, unitId:u.id, unitName:u.name, semester:u.semester, q:q };
}
/* 啟動時清掉錯題本中已失效的 id(含舊版 index 型 id) */
(function cleanWrongStore(){
  let dirty = false;
  Object.keys(store.wrong).forEach(id => {
    if(!resolveQ(id)){
      delete store.wrong[id];
      store.wrongGone[id] = Date.now(); /* 留墓碑,避免合併時從另一裝置復活 */
      dirty = true;
    }
  });
  if(dirty) saveStore();
})();
function unitName(id){
  for(const k of Object.keys(QB)){
    const s = QB[k];
    if(!s || !Array.isArray(s.units)) continue;
    const u = s.units.find(x => x.id === id);
    if(u) return u.name;
  }
  return id;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
/* Y 軸好看刻度:回傳 {max, step} */
function niceScale(maxVal){
  if(maxVal <= 4) return { max:4, step:1 };
  const steps = [1,2,5,10,20,25,50,100,200,500];
  for(const st of steps){
    if(maxVal <= st * 4) return { max:Math.ceil(maxVal / st) * st, step:st };
  }
  const st = Math.pow(10, Math.ceil(Math.log10(maxVal / 4)));
  return { max:Math.ceil(maxVal / st) * st, step:st };
}

/* 近 14 天每日答題數:雙色堆疊長條(下=答對 good、上=答錯 bad)
   拆成可傳入任意 store 的建構函式,家長儀表板重用 */
function buildDailyChartSVG(st){
  const days = Core.lastNDays(st, 14);
  const W = 360, H = 190, padL = 30, padR = 6, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const sc = niceScale(Math.max.apply(null, days.map(d => d.a)));
  const slot = plotW / 14, barW = Math.min(16, slot * 0.62);
  let s = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="近14天每日答題數長條圖">';
  /* Y 軸格線與刻度 */
  for(let v = 0; v <= sc.max; v += sc.step){
    const y = padT + plotH - v / sc.max * plotH;
    s += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="var(--line)" stroke-width="' + (v === 0 ? 1 : 0.5) + '"/>';
    s += '<text x="' + (padL - 5) + '" y="' + (y + 3.5) + '" text-anchor="end" font-size="10" fill="var(--muted)">' + v + '</text>';
  }
  days.forEach((d, i) => {
    const cx = padL + slot * i + slot / 2;
    const x = cx - barW / 2;
    const baseY = padT + plotH;
    if(d.a > 0){
      const hAll = d.a / sc.max * plotH;
      const hOk = d.c / sc.max * plotH;
      const hNg = hAll - hOk;
      if(hNg > 0) s += '<rect x="' + x + '" y="' + (baseY - hAll) + '" width="' + barW + '" height="' + hNg + '" rx="1.5" fill="var(--bad)"/>';
      if(hOk > 0) s += '<rect x="' + x + '" y="' + (baseY - hOk) + '" width="' + barW + '" height="' + hOk + '" rx="1.5" fill="var(--good)"/>';
    } else {
      /* 空條:無資料日也佔位 */
      s += '<rect x="' + x + '" y="' + (baseY - 2) + '" width="' + barW + '" height="2" rx="1" fill="var(--line)"/>';
    }
    /* X 軸標籤:從今天往回隔天標一次,避免擁擠 */
    if((days.length - 1 - i) % 2 === 0){
      s += '<text x="' + cx + '" y="' + (H - 8) + '" text-anchor="middle" font-size="9" fill="var(--muted)">' + d.m + '/' + d.d + '</text>';
    }
  });
  s += '</svg>';
  s += '<div class="chart-legend">' +
    '<span><span class="lg-dot" style="background:var(--good)"></span>答對</span>' +
    '<span><span class="lg-dot" style="background:var(--bad)"></span>答錯</span></div>';
  return s;
}
function renderDailyChart(){
  document.getElementById('chartDaily').innerHTML = buildDailyChartSVG(store);
}
/* 近 14 天正確率趨勢折線,無作答日留空不連線 */
function renderTrendChart(){
  const days = Core.lastNDays(store, 14);
  const W = 360, H = 170, padL = 34, padR = 8, padT = 10, padB = 24;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const slot = plotW / 14;
  const pt = i => padL + slot * i + slot / 2;
  const py = rate => padT + plotH - rate / 100 * plotH;
  let s = '<svg viewBox="0 0 ' + W + ' ' + H + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="近14天正確率趨勢折線圖">';
  [0, 25, 50, 75, 100].forEach(v => {
    const y = py(v);
    s += '<line x1="' + padL + '" y1="' + y + '" x2="' + (W - padR) + '" y2="' + y + '" stroke="var(--line)" stroke-width="' + (v === 0 ? 1 : 0.5) + '"/>';
    s += '<text x="' + (padL - 5) + '" y="' + (y + 3.5) + '" text-anchor="end" font-size="10" fill="var(--muted)">' + v + '%</text>';
  });
  /* 分段路徑:遇到無作答日就斷線 */
  let path = '', pen = false, hasData = false;
  days.forEach((d, i) => {
    if(d.a > 0){
      hasData = true;
      const x = pt(i), y = py(Math.round(100 * d.c / d.a));
      path += (pen ? ' L' : ' M') + x.toFixed(1) + ' ' + y.toFixed(1);
      pen = true;
    } else {
      pen = false;
    }
    if((days.length - 1 - i) % 2 === 0){
      s += '<text x="' + pt(i) + '" y="' + (H - 8) + '" text-anchor="middle" font-size="9" fill="var(--muted)">' + d.m + '/' + d.d + '</text>';
    }
  });
  if(path) s += '<path d="' + path.trim() + '" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  days.forEach((d, i) => {
    if(d.a > 0){
      s += '<circle cx="' + pt(i) + '" cy="' + py(Math.round(100 * d.c / d.a)) + '" r="3" fill="var(--accent)"/>';
    }
  });
  if(!hasData){
    s += '<text x="' + (W / 2) + '" y="' + (padT + plotH / 2) + '" text-anchor="middle" font-size="12" fill="var(--muted)">還沒有作答紀錄</text>';
  }
  s += '</svg>';
  document.getElementById('chartTrend').innerHTML = s;
}
/* 科目答題分布:水平堆疊條 + 圖例(科名+題數+百分比) */
function renderSubjChart(){
  const box = document.getElementById('chartSubj');
  const rows = SUBJECTS.map(sj => {
    const st = Core.subjectStats(store, sj.key);
    return { name:sj.name, color:sj.color, a:st.a };
  });
  const total = rows.reduce((t, r) => t + r.a, 0);
  if(!total){
    box.innerHTML = '<div class="empty" style="padding:18px 10px">還沒有作答紀錄,測一回就有分布圖</div>';
    return;
  }
  const W = 360, BH = 26;
  let s = '<svg viewBox="0 0 ' + W + ' ' + (BH + 8) + '" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="科目答題分布堆疊條">';
  let x = 0;
  rows.forEach(r => {
    if(!r.a) return;
    const w = r.a / total * W;
    s += '<rect x="' + x.toFixed(1) + '" y="4" width="' + w.toFixed(1) + '" height="' + BH + '" fill="' + r.color + '"/>';
    x += w;
  });
  s += '</svg>';
  s += '<div class="chart-legend">' + rows.filter(r => r.a).map(r =>
    '<span><span class="lg-dot" style="background:' + r.color + '"></span>' + esc(r.name) +
    ' ' + r.a + ' 題(' + Math.round(100 * r.a / total) + '%)</span>').join('') + '</div>';
  box.innerHTML = s;
}

/* 五科正確率橫條列(可傳入任意 store,家長儀表板重用) */
function buildSubjRowsHTML(st){
  return SUBJECTS.map(function(s){
    const t = Core.subjectStats(st, s.key);
    return '<div class="stat-row">' +
      '<span class="sname">' + s.name + '</span>' +
      '<span class="stat-bar"><i style="width:' + (t.rate || 0) + '%;background:' + s.color + '"></i></span>' +
      '<span class="stat-num">' + t.a + ' 題.' + (t.rate === null ? '--' : t.rate + '%') + '</span></div>';
  }).join('');
}

/* ---------- 月曆掛載(v1.3.0):換月 ‹ › + 點日展開明細,家長儀表板重用 ---------- */
function mountCalendar(box, getStore){
  const now = new Date();
  const st = { y: now.getFullYear(), m: now.getMonth() + 1, sel: '' };
  function draw(){ box.innerHTML = Core.renderCalendar(getStore(), st.y, st.m, st.sel); }
  box.addEventListener('click', function(ev){
    const b = ev.target.closest('button');
    if(!b || !box.contains(b)) return;
    if(b.dataset.cal === 'prev'){
      st.m--; if(st.m < 1){ st.m = 12; st.y--; }
      st.sel = ''; draw();
    } else if(b.dataset.cal === 'next'){
      st.m++; if(st.m > 12){ st.m = 1; st.y++; }
      st.sel = ''; draw();
    } else if(b.dataset.date){
      st.sel = (st.sel === b.dataset.date) ? '' : b.dataset.date;
      draw();
    }
  });
  draw();
  return { redraw: draw };
}

/* ---------- 綜合累積(v1.3.0):可傳入任意 store,家長儀表板重用 ---------- */
function subjTotals(){
  const t = {};
  SUBJECTS.forEach(function(s){
    let n = 0;
    const qb = QB[s.key];
    if(qb && Array.isArray(qb.units)) qb.units.forEach(function(u){ n += (u.questions || []).length; });
    t[s.key] = n;
  });
  return t;
}
let _validIdSet = null;
function validIdSet(){
  if(!_validIdSet) _validIdSet = new Set(Core.buildPool(QB, SUBJECTS.map(s => s.key)).map(p => p.id));
  return _validIdSet;
}
function buildSeenHTML(st){
  const stats = Core.seenStats(st, subjTotals(), validIdSet());
  let anyAtt = false, tSeen = 0, tAll = 0, tOnce = 0, tAtt = 0, tCor = 0;
  const rows = SUBJECTS.map(function(s){
    const r = stats[s.key] || { seen:0, total:0, once:0, att:0, cor:0, rate:null };
    tSeen += r.seen; tAll += r.total; tOnce += r.once; tAtt += r.att; tCor += r.cor;
    if(r.att) anyAtt = true;
    return '<div class="seen-row"><span class="sname">' + s.name + '</span>' +
      '<span class="seen-txt">做過 ' + r.seen + '/' + r.total + ' 題.答對過 ' + r.once +
      ' 題.累計 ' + r.att + ' 次作答.正確率 ' + (r.rate === null ? '--' : r.rate + '%') + '</span></div>';
  }).join('');
  const tRate = tAtt ? Math.round(100 * tCor / tAtt) : null;
  return '<div class="seen-card">' + rows +
    '<div class="seen-row seen-total"><span class="sname">合計</span>' +
    '<span class="seen-txt">做過 ' + tSeen + '/' + tAll + ' 題.答對過 ' + tOnce +
    ' 題.累計 ' + tAtt + ' 次作答.正確率 ' + (tRate === null ? '--' : tRate + '%') + '</span></div>' +
    (anyAtt ? '' : '<div class="tc-sub" style="padding:4px 0 2px">逐題累積自 v1.3.0 起計,之前的作答不在此列</div>') +
    '</div>';
}

/* ---------- 統計 ---------- */
let statsCal = null;
function renderStats(){
  renderToday();
  renderDailyChart();
  if(!statsCal) statsCal = mountCalendar(document.getElementById('calStats'), function(){ return store; });
  else statsCal.redraw();

  document.getElementById('verLine').textContent = '國二五科複習快測 v' + APP_VERSION;

/* ---------- 登入同步列 ---------- */
function fmtHM(ms){
  const d = new Date(ms);
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
function fmtDT(ms){
  const d = new Date(ms);
  return (d.getMonth() + 1) + '/' + d.getDate() + ' ' + fmtHM(ms);
}
function renderAuthBar(){
  const bar = document.getElementById('authBar');
  if(!bar) return;
  bar.textContent = '';
  if(Sync.offline){
    bar.innerHTML = '<span>離線,雲端同步暫停(功能不受影響)</span>';
    return;
  }
  if(!Sync.adapter){
    bar.innerHTML = '<span>雲端同步準備中…</span>';
    return;
  }
  if(!Sync.user){
    const b = document.createElement('button');
    b.className = 'auth-btn'; b.id = 'btnLogin';
    b.textContent = '使用 Google 登入以同步';
    b.addEventListener('click', function(){ Sync.adapter.signIn(); });
    bar.appendChild(b);
    if(Sync.status.state === 'error'){ /* redirect 登入失敗等錯誤代碼 */
      const er = document.createElement('span');
      er.className = 'auth-status err';
      er.textContent = '登入失敗:' + Sync.status.msg;
      bar.appendChild(er);
    }
    return;
  }
  const nm = document.createElement('span');
  nm.className = 'auth-name';
  nm.textContent = Sync.user.displayName || Sync.user.email || '';
  const st = document.createElement('span');
  st.className = 'auth-status';
  if(Sync.status.state === 'syncing'){ st.textContent = '同步中…'; }
  else if(Sync.status.state === 'error'){ st.classList.add('err'); st.textContent = '同步失敗:' + Sync.status.msg; }
  else if(Sync.meta.lastSyncAt){ st.classList.add('ok'); st.textContent = '已同步 ' + fmtHM(Sync.meta.lastSyncAt); }
  else { st.textContent = ''; }
  const out = document.createElement('button');
  out.className = 'auth-btn'; out.id = 'btnLogout';
  out.textContent = '登出';
  out.addEventListener('click', function(){ Sync.adapter.signOut(); });
  bar.appendChild(nm); bar.appendChild(st); bar.appendChild(out);
}

/* ---------- 家長儀表板 ---------- */
function updateParentTab(){
  const btn = document.getElementById('navParent');
  const isP = Sync.isParent();
  btn.classList.toggle('hidden', !isP);
  if(!isP && !document.getElementById('view-parent').classList.contains('hidden')) show('home');
}
/* 隱藏孩子清單(v1.3.0,只存本機) */
const PARENT_HIDDEN_KEY = 'g8review_parent_hidden';
let parentShowHidden = false;
let parentKidsCache = null; /* 最近一次 listDocs 結果,隱藏/顯示切換免重抓 */
function getHiddenKids(){
  try{
    const a = JSON.parse(localStorage.getItem(PARENT_HIDDEN_KEY));
    if(Array.isArray(a)) return a.filter(function(x){ return typeof x === 'string'; });
  }catch(e){}
  return [];
}
function setHiddenKids(a){
  try{ localStorage.setItem(PARENT_HIDDEN_KEY, JSON.stringify(a)); }catch(e){}
}
async function renderParent(){
  const box = document.getElementById('parentList');
  if(!Sync.isParent() || !Sync.adapter){
    box.innerHTML = '<div class="empty">此頁僅家長帳號登入後可用</div>';
    return;
  }
  box.innerHTML = '<div class="empty">載入中…</div>';
  let docs;
  try{
    docs = await Sync.adapter.listDocs();
  }catch(err){
    box.innerHTML = '<div class="empty">載入失敗:' + esc(Sync.errMsg(err)) + '</div>';
    return;
  }
  parentKidsCache = (docs || []).filter(function(d){
    return d && d.id !== Sync.docId() && d.data && d.data.store && typeof d.data.store === 'object';
  });
  renderParentList();
}
/* 用快取資料重畫清單(隱藏切換走這裡,不重抓雲端) */
function renderParentList(){
  const box = document.getElementById('parentList');
  const kids = parentKidsCache || [];
  if(!kids.length){
    box.innerHTML = '<div class="empty">還沒有孩子的雲端紀錄</div>';
    return;
  }
  const hidden = getHiddenKids();
  const vis = kids.filter(function(k){ return hidden.indexOf(k.id) < 0; });
  const hid = kids.filter(function(k){ return hidden.indexOf(k.id) >= 0; });
  box.textContent = '';
  vis.forEach(function(k){ box.appendChild(buildKidCard(k, false)); });
  if(!vis.length){
    const d = document.createElement('div');
    d.className = 'empty';
    d.textContent = '所有孩子都被隱藏了';
    box.appendChild(d);
  }
  if(hid.length){
    const tg = document.createElement('button');
    tg.className = 'btn ghost small';
    tg.textContent = (parentShowHidden ? '收合已隱藏的孩子(' : '顯示已隱藏的孩子(') + hid.length + ')';
    tg.addEventListener('click', function(){ parentShowHidden = !parentShowHidden; renderParentList(); });
    box.appendChild(tg);
    if(parentShowHidden){
      hid.forEach(function(k){ box.appendChild(buildKidCard(k, true)); });
    }
  } else {
    parentShowHidden = false;
  }
}
function buildKidCard(k, isHidden){
  const st = Core.sanitizeStore(k.data.store); /* 白名單重建:雲端資料不可信,防 XSS/污染 */
  const t = Core.lastNDays(st, 1)[0];
  const rate = t.a ? Math.round(100 * t.c / t.a) : null;
  const wrongN = Object.keys(st.wrong || {}).length;
  const weak = Core.weakUnits(st, 3);
  const upd = Sync.tsToMs(k.data.updatedAt);
  const card = document.createElement('div');
  card.className = 'kid-card';
  if(isHidden) card.style.opacity = '.65';
  card.innerHTML =
    '<div class="kid-head"><span class="kid-name">' + esc(k.data.name || k.data.email || k.id) + '</span>' +
      '<span class="kid-upd">' + (upd ? '更新 ' + fmtDT(upd) : '') + '</span></div>' +
    '<div class="kid-today">今日已答 ' + t.a + ' 題.正確率 ' + (rate === null ? '--' : rate + '%') +
      '.錯題本 ' + wrongN + ' 題</div>' +
    '<div class="kid-cal"></div>' +
    buildSeenHTML(st) +
    buildSubjRowsHTML(st) +
    (weak.length
      ? '<div class="stat-row"><span style="flex:1;font-size:.9rem"><span class="pill">最弱單元</span>' +
        '<span class="pill">' + esc(subjName(weak[0].s)) + '</span>' + esc(unitName(weak[0].id)) + '</span>' +
        '<span class="stat-num" style="color:var(--bad)">錯 ' + Math.round(weak[0].err * 100) + '%(' +
        (weak[0].a - weak[0].c) + '/' + weak[0].a + ')</span></div>'
      : '<div class="kid-today" style="color:var(--muted);margin-bottom:0">還沒有足夠資料分析弱單元</div>');
  /* 右上「隱藏 / 取消隱藏」小鈕 */
  const hideBtn = document.createElement('button');
  hideBtn.className = 'kid-hide';
  hideBtn.textContent = isHidden ? '取消隱藏' : '隱藏';
  hideBtn.addEventListener('click', function(){
    const h = getHiddenKids();
    if(isHidden){ setHiddenKids(h.filter(function(x){ return x !== k.id; })); }
    else if(h.indexOf(k.id) < 0){ h.push(k.id); setHiddenKids(h); }
    renderParentList();
  });
  card.querySelector('.kid-head').appendChild(hideBtn);
  /* 月曆(v1.3.0):取代原 14 天長條圖,預設當月、可換月、點日看明細 */
  mountCalendar(card.querySelector('.kid-cal'), function(){ return st; });
  return card;
}
document.getElementById('btnParentRefresh').addEventListener('click', renderParent);

/* ---------- PWA ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

renderHome();
show('home');
renderAuthBar();
</script>

<!-- Firebase 雲端同步(沿用 speed-training-base 專案;動態 import,離線/載入失敗不影響 App) -->
<script type="module">
(async function(){
  const G8 = window.__g8;
  if(!G8) return;
  /* 測試鉤子:?nofb=1 模擬 SDK 載入失敗(離線情境) */
  if(/[?&]nofb=1/.test(location.search)){ G8.Sync.setOffline(); return; }
  let appMod, authMod, fsMod;
  try{
    const base = 'https://www.gstatic.com/firebasejs/10.12.2/';
    appMod = await import(base + 'firebase-app.js');
    authMod = await import(base + 'firebase-auth.js');
    fsMod = await import(base + 'firebase-firestore.js');
  }catch(e){ G8.Sync.setOffline(); return; }
  let auth, db;
  try{
    const firebaseConfig = {
      apiKey: "AIzaSyAbyytsv6KoDKGunZ2WYru9gHNYhqOc46A",
      authDomain: "speed-training-base.firebaseapp.com",
      projectId: "speed-training-base",
      storageBucket: "speed-training-base.firebasestorage.app",
      messagingSenderId: "608450867846",
      appId: "1:608450867846:web:3aa98d3a0eba122af1d707"
    };
    const app = appMod.initializeApp(firebaseConfig);
    auth = authMod.getAuth(app);
    db = fsMod.getFirestore(app);
  }catch(e){ G8.Sync.setOffline(); return; }
  const provider = new authMod.GoogleAuthProvider();
  const adapter = {
    onAuth(cb){
      authMod.onAuthStateChanged(auth, function(u){
        cb(u ? { uid: u.uid, email: u.email || '', displayName: u.displayName || '' } : null);
      });
    },
    async signIn(){
      try{
        await authMod.signInWithPopup(auth, provider);
      }catch(err){
        const code = err && err.code;
        if(code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') return;
        /* popup 失敗(常見於 iOS PWA)→ 自動改用 redirect */
        try{ await authMod.signInWithRedirect(auth, provider); }
        catch(e2){ G8.Sync.setStatus('error', G8.Sync.errMsg(e2)); }
      }
    },
    signOut(){ return authMod.signOut(auth); },
    async fetchDoc(id){
      const snap = await fsMod.getDoc(fsMod.doc(db, 'g8review', id));
      return snap.exists() ? snap.data() : null;
    },
    saveDoc(id, payload){ return fsMod.setDoc(fsMod.doc(db, 'g8review', id), payload); },
    async listDocs(){
      const q = fsMod.collection(db, 'g8review');
      const rs = await fsMod.getDocs(q);
      const out = [];
      rs.forEach(function(d){ out.push({ id: d.id, data: d.data() }); });
      return out;
    }
  };
  try{ await authMod.getRedirectResult(auth); }
  catch(e){ G8.Sync.setStatus('error', G8.Sync.errMsg(e)); }
  G8.Sync.init(adapter);
})();
</script>
