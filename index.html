<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e131f">
<title>國二五科複習快測</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%232f6df6'/%3E%3Ctext x='50' y='66' font-size='48' text-anchor='middle' fill='white' font-family='sans-serif'%3E%E6%B8%AC%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#0e131f; --card:#1a2233; --card2:#222c42; --line:#2e3a55;
  --text:#e8edf7; --muted:#93a0bb;
  --accent:#4f8ef7; --good:#3ecf8e; --bad:#f2555a; --warn:#f7b84f;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--text);
  font-family:-apple-system,"PingFang TC","Microsoft JhengHei",system-ui,sans-serif;
  font-size:17px; line-height:1.55;
  padding-bottom:calc(64px + env(safe-area-inset-bottom));
  max-width:640px; margin:0 auto;
  overflow-x:hidden;
}
main{padding:16px 14px 24px;}
h1{font-size:1.25rem; margin:6px 0 2px;}
h2{font-size:1.1rem; margin:18px 0 10px;}
.sub{color:var(--muted); font-size:.85rem; margin:0 0 14px;}
.hidden{display:none !important;}
button{font:inherit; color:inherit; border:0; cursor:pointer;}

/* 首頁科目卡 */
.subj-grid{display:flex; flex-direction:column; gap:10px;}
.subj-card{
  display:flex; align-items:center; gap:12px;
  background:var(--card); border:2px solid var(--line); border-radius:var(--r);
  padding:12px 14px; min-height:64px; width:100%; text-align:left;
}
.subj-card.sel{border-color:var(--accent); background:var(--card2);}
.subj-card.dead{opacity:.45;}
.subj-dot{width:14px; height:14px; border-radius:50%; flex:none;}
.subj-name{font-size:1.05rem; font-weight:700;}
.subj-meta{margin-left:auto; text-align:right; color:var(--muted); font-size:.8rem; line-height:1.4;}
.subj-check{width:26px; height:26px; border-radius:50%; border:2px solid var(--line);
  flex:none; display:flex; align-items:center; justify-content:center; font-size:.9rem;}
.subj-card.sel .subj-check{background:var(--accent); border-color:var(--accent);}
.btn{
  display:block; width:100%; min-height:52px; border-radius:var(--r);
  background:var(--accent); color:#fff; font-size:1.1rem; font-weight:700;
  padding:12px; margin-top:16px;
}
.btn:disabled{opacity:.4; cursor:default;}
.btn.ghost{background:var(--card); border:2px solid var(--line); color:var(--text);}
.btn.small{min-height:46px; font-size:1rem; margin-top:10px;}

/* 測驗 */
.progress-wrap{height:8px; background:var(--card); border-radius:4px; overflow:hidden; margin:10px 0 4px;}
.progress-bar{height:100%; width:0%; background:var(--accent); transition:width .25s;}
.quiz-top{display:flex; justify-content:space-between; color:var(--muted); font-size:.85rem;}
.q-unit{display:inline-block; background:var(--card2); border-radius:8px;
  padding:2px 10px; font-size:.78rem; color:var(--muted); margin:12px 0 8px;}
.q-text{font-size:1.12rem; font-weight:600; white-space:pre-wrap; word-break:break-word; margin-bottom:14px;}
.opts{display:flex; flex-direction:column; gap:10px;}
.opt{
  background:var(--card); border:2px solid var(--line); border-radius:var(--r);
  padding:12px 14px; min-height:50px; text-align:left; font-size:1rem;
  white-space:pre-wrap; word-break:break-word; display:flex; gap:10px;
}
.opt .tag{color:var(--muted); font-weight:700; flex:none;}
.opt.correct{border-color:var(--good); background:rgba(62,207,142,.12);}
.opt.wrong{border-color:var(--bad); background:rgba(242,85,90,.12);}
.opt:disabled{cursor:default;}
.exp-box{
  background:var(--card); border-left:4px solid var(--warn); border-radius:10px;
  padding:12px 14px; margin-top:14px; font-size:.95rem; white-space:pre-wrap; word-break:break-word;
}
.exp-box .verdict{font-weight:800; margin-bottom:4px;}
.verdict.ok{color:var(--good);} .verdict.ng{color:var(--bad);}

/* 結算 / 回顧 */
.score-card{background:var(--card); border-radius:var(--r); padding:20px; text-align:center; margin-bottom:14px;}
.score-big{font-size:2.6rem; font-weight:800;}
.review-item{background:var(--card); border-radius:var(--r); padding:12px 14px; margin-bottom:10px; font-size:.92rem;}
.review-item .rq{font-weight:600; white-space:pre-wrap; word-break:break-word;}
.review-item .ra{margin-top:6px; white-space:pre-wrap; word-break:break-word;}
.mark-ok{color:var(--good); font-weight:800;} .mark-ng{color:var(--bad); font-weight:800;}

/* 錯題本 / 統計 */
.wrong-item{background:var(--card); border-radius:var(--r); padding:12px 14px; margin-bottom:10px;}
.wrong-item .wq{white-space:pre-wrap; word-break:break-word; font-size:.95rem;}
.pill{display:inline-block; background:var(--card2); border-radius:8px; padding:1px 8px;
  font-size:.75rem; color:var(--muted); margin-right:6px; margin-bottom:4px;}
.stat-row{display:flex; align-items:center; gap:10px; background:var(--card);
  border-radius:var(--r); padding:12px 14px; margin-bottom:8px;}
.stat-row .sname{font-weight:700; width:3.2em;}
.stat-bar{flex:1; height:8px; background:var(--card2); border-radius:4px; overflow:hidden;}
.stat-bar i{display:block; height:100%; background:var(--good);}
.stat-num{color:var(--muted); font-size:.8rem; text-align:right; min-width:7em;}
.empty{color:var(--muted); text-align:center; padding:30px 10px; font-size:.95rem;}
.ver{color:var(--muted); font-size:.75rem; text-align:center; margin-top:22px;}

/* 底部導覽 */
nav{
  position:fixed; bottom:0; left:0; right:0; z-index:10;
  display:flex; background:#131a2a; border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
  max-width:640px; margin:0 auto;
}
nav button{
  flex:1; background:none; color:var(--muted); min-height:60px;
  font-size:.85rem; display:flex; flex-direction:column; gap:2px; align-items:center; justify-content:center;
}
nav button.on{color:var(--accent); font-weight:700;}
nav .ico{font-size:1.25rem; line-height:1;}
</style>
</head>
<body>

<main>
  <!-- 首頁 -->
  <section id="view-home">
    <h1>國二五科複習快測</h1>
    <p class="sub">勾選科目,隨機抽 10 題快速測驗</p>
    <div class="subj-grid" id="subjGrid"></div>
    <button class="btn" id="btnStart">開始快測</button>
  </section>

  <!-- 測驗 -->
  <section id="view-quiz" class="hidden">
    <div class="quiz-top"><span id="quizProg"></span><span id="quizTimer">0:00</span></div>
    <div class="progress-wrap"><div class="progress-bar" id="quizBar"></div></div>
    <div class="q-unit" id="quizUnit"></div>
    <div class="q-text" id="quizQ"></div>
    <div class="opts" id="quizOpts"></div>
    <div class="exp-box hidden" id="quizExp"></div>
    <button class="btn hidden" id="btnNext">下一題</button>
    <button class="btn ghost small" id="btnQuit">中止測驗</button>
  </section>

  <!-- 結算 -->
  <section id="view-result" class="hidden">
    <h1>測驗結果</h1>
    <div class="score-card">
      <div class="score-big" id="resScore"></div>
      <div class="sub" id="resMeta"></div>
    </div>
    <button class="btn" id="btnAgain">再測一次</button>
    <button class="btn ghost small" id="btnHome2">回首頁</button>
    <h2>逐題回顧</h2>
    <div id="resReview"></div>
  </section>

  <!-- 錯題本 -->
  <section id="view-wrong" class="hidden">
    <h1>錯題本</h1>
    <p class="sub">答錯自動收錄;同一題累計答對 2 次自動移出</p>
    <button class="btn" id="btnRetestWrong">重測錯題</button>
    <div id="wrongList" style="margin-top:14px"></div>
  </section>

  <!-- 統計 -->
  <section id="view-stats" class="hidden">
    <h1>學習統計</h1>
    <h2>各科表現</h2>
    <div id="statSubj"></div>
    <h2>最弱單元(答過 ≥3 題)</h2>
    <div id="statWeak"></div>
    <div class="ver" id="verLine"></div>
  </section>
</main>

<nav>
  <button data-tab="home" class="on"><span class="ico">&#127968;</span>首頁</button>
  <button data-tab="wrong"><span class="ico">&#128213;</span>錯題本</button>
  <button data-tab="stats"><span class="ico">&#128202;</span>統計</button>
</nav>

<!-- 題庫(缺檔時該科自動停用,App 其餘功能照常) -->
<script src="data/chinese.js"></script>
<script src="data/english.js"></script>
<script src="data/math.js"></script>
<script src="data/science.js"></script>
<script src="data/social.js"></script>

<script>
'use strict';
const APP_VERSION = '1.0.1';
const LS_KEY = 'g8review_v1';

/*CORE-START*/
const Core = {
  newStore(){ return { v:1, subj:{}, unit:{}, wrong:{} }; },
  // 題幹短 hash(djb2 → 36 進位),題庫增刪題也不會錯位
  qhash(str){
    str = String(str);
    let h = 5381;
    for(let i = 0; i < str.length; i++){
      h = ((h << 5) + h + str.charCodeAt(i)) >>> 0;
    }
    return h.toString(36);
  },
  // Fisher-Yates 抽 n 題(不足全出)
  pick(pool, n, rand){
    rand = rand || Math.random;
    const arr = pool.slice();
    for(let i = arr.length - 1; i > 0; i--){
      const j = Math.floor(rand() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr.slice(0, Math.min(n, arr.length));
  },
  // 把勾選科目攤平成題池,每題帶穩定 id
  buildPool(qb, keys){
    const pool = [];
    keys.forEach(function(k){
      const s = qb[k];
      if(!s || !Array.isArray(s.units)) return;
      s.units.forEach(function(u){
        (u.questions || []).forEach(function(q){
          if(!q || !Array.isArray(q.options) || q.options.length !== 4) return;
          if(typeof q.a !== 'number' || q.a < 0 || q.a > 3) return;
          pool.push({ id: k + '|' + u.id + '|' + Core.qhash(q.q), subj: k, subjName: s.subject,
                      unitId: u.id, unitName: u.name, semester: u.semester, q: q });
        });
      });
    });
    return pool;
  },
  // 記一筆作答:科別/單元統計 + 錯題本進出(答錯進本、累計答對2次移出、再錯歸零)
  record(store, item, correct){
    const s = store.subj[item.subj] || (store.subj[item.subj] = { a:0, c:0 });
    s.a++; if(correct) s.c++;
    const u = store.unit[item.unitId] || (store.unit[item.unitId] = { a:0, c:0, s:item.subj });
    u.a++; if(correct) u.c++;
    if(correct){
      const w = store.wrong[item.id];
      if(w){ w.k = (w.k || 0) + 1; if(w.k >= 2) delete store.wrong[item.id]; }
    } else {
      store.wrong[item.id] = { k:0, t:Date.now() };
    }
  },
  subjectStats(store, key){
    const s = store.subj[key];
    if(!s || !s.a) return { a:0, c:0, rate:null };
    return { a:s.a, c:s.c, rate:Math.round(100 * s.c / s.a) };
  },
  // 最弱單元:答過 >= min 題、依錯誤率排序,取前 3
  weakUnits(store, min){
    if(min == null) min = 3;
    const out = [];
    Object.keys(store.unit).forEach(function(id){
      const u = store.unit[id];
      if(u.a >= min && u.a > u.c){
        out.push({ id:id, s:u.s, a:u.a, c:u.c, err:(u.a - u.c) / u.a });
      }
    });
    out.sort(function(x, y){ return y.err - x.err || y.a - x.a; });
    return out.slice(0, 3);
  }
};
if (typeof module !== 'undefined' && module.exports){ module.exports = Core; }
/*CORE-END*/

/* ---------- 資料與狀態 ---------- */
const SUBJECTS = [
  { key:'chinese', name:'國文', color:'#f2555a' },
  { key:'english', name:'英文', color:'#4f8ef7' },
  { key:'math',    name:'數學', color:'#f7b84f' },
  { key:'science', name:'自然', color:'#3ecf8e' },
  { key:'social',  name:'社會', color:'#b07cf7' }
];
const QB = window.QB || {};
function subjLoaded(k){
  return !!(QB[k] && Array.isArray(QB[k].units) &&
    QB[k].units.some(u => (u.questions || []).length > 0));
}
function loadStore(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && s.v === 1) return s; }
  }catch(e){}
  return Core.newStore();
}
function saveStore(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(store)); }catch(e){} }
let store = loadStore();
const selected = new Set(SUBJECTS.filter(s => subjLoaded(s.key)).map(s => s.key));

/* 用 id 反查題目(給錯題本用) */
function resolveQ(id){
  const p = id.split('|');
  if(p.length !== 3) return null;
  const s = QB[p[0]];
  if(!s || !Array.isArray(s.units)) return null;
  const u = s.units.find(x => x.id === p[1]);
  if(!u) return null;
  const q = (u.questions || []).find(x => x && Core.qhash(x.q) === p[2]);
  if(!q) return null;
  return { id:id, subj:p[0], subjName:s.subject, unitId:u.id, unitName:u.name, semester:u.semester, q:q };
}
/* 啟動時清掉錯題本中已失效的 id(含舊版 index 型 id) */
(function cleanWrongStore(){
  let dirty = false;
  Object.keys(store.wrong).forEach(id => {
    if(!resolveQ(id)){ delete store.wrong[id]; dirty = true; }
  });
  if(dirty) saveStore();
})();
function unitName(id){
  for(const k of Object.keys(QB)){
    const s = QB[k];
    if(!s || !Array.isArray(s.units)) continue;
    const u = s.units.find(x => x.id === id);
    if(u) return u.name;
  }
  return id;
}
const subjName = k => (SUBJECTS.find(s => s.key === k) || { name:k }).name;

/* ---------- 畫面切換 ---------- */
const VIEWS = ['home','quiz','result','wrong','stats'];
/* 測驗進行中 = 有題、還沒答完、且目前停在測驗畫面(finishQuiz 後 quiz.i >= length 即非進行中) */
function quizActive(){
  return quiz.list.length > 0 && quiz.i < quiz.list.length &&
    !document.getElementById('view-quiz').classList.contains('hidden');
}
function show(v){
  if(v !== 'quiz' && quizActive()){
    if(!confirm('測驗進行中,確定要離開嗎?未作答的題目不會計分')) return;
    quiz.list = []; /* 標記結束,避免重複詢問 */
  }
  VIEWS.forEach(x => document.getElementById('view-' + x).classList.toggle('hidden', x !== v));
  document.querySelectorAll('nav button').forEach(b => {
    b.classList.toggle('on', b.dataset.tab === v || (v === 'result' && b.dataset.tab === 'home'));
  });
  if(quiz.timerId && v !== 'quiz'){ clearInterval(quiz.timerId); quiz.timerId = 0; }
  if(v === 'home') renderHome();
  if(v === 'wrong') renderWrong();
  if(v === 'stats') renderStats();
  window.scrollTo(0, 0);
}
document.querySelectorAll('nav button').forEach(b =>
  b.addEventListener('click', () => show(b.dataset.tab)));

/* ---------- 首頁 ---------- */
function renderHome(){
  const grid = document.getElementById('subjGrid');
  grid.textContent = '';
  SUBJECTS.forEach(s => {
    const ok = subjLoaded(s.key);
    const btn = document.createElement('button');
    btn.className = 'subj-card' + (ok ? (selected.has(s.key) ? ' sel' : '') : ' dead');
    btn.disabled = !ok;
    const st = Core.subjectStats(store, s.key);
    const meta = ok
      ? '已答 ' + st.a + ' 題' + (st.rate === null ? '' : '\n正確率 ' + st.rate + '%')
      : '題庫未載入';
    btn.innerHTML =
      '<span class="subj-dot" style="background:' + s.color + '"></span>' +
      '<span class="subj-name">' + s.name + '</span>' +
      '<span class="subj-meta" style="white-space:pre-line">' + meta + '</span>' +
      '<span class="subj-check">' + (ok && selected.has(s.key) ? '&#10003;' : '') + '</span>';
    btn.addEventListener('click', () => {
      if(selected.has(s.key)) selected.delete(s.key); else selected.add(s.key);
      renderHome();
    });
    grid.appendChild(btn);
  });
  document.getElementById('btnStart').disabled = selected.size === 0;
}

/* ---------- 測驗 ---------- */
const quiz = { list:[], i:0, correct:0, answers:[], t0:0, timerId:0, retest:false };

function startQuiz(pool, retest){
  if(!pool.length) return;
  quiz.list = Core.pick(pool, 10);
  quiz.i = 0; quiz.correct = 0; quiz.answers = [];
  quiz.t0 = Date.now(); quiz.retest = !!retest;
  show('quiz');
  clearInterval(quiz.timerId);
  quiz.timerId = setInterval(() => {
    document.getElementById('quizTimer').textContent = fmtSec((Date.now() - quiz.t0) / 1000);
  }, 500);
  renderQuestion();
}
function fmtSec(sec){
  sec = Math.floor(sec);
  return Math.floor(sec / 60) + ':' + String(sec % 60).padStart(2, '0');
}
document.getElementById('btnStart').addEventListener('click', () => {
  startQuiz(Core.buildPool(QB, [...selected]), false);
});
document.getElementById('btnQuit').addEventListener('click', () => show('home'));

function renderQuestion(){
  const item = quiz.list[quiz.i];
  document.getElementById('quizProg').textContent = '第 ' + (quiz.i + 1) + ' / ' + quiz.list.length + ' 題' + (quiz.retest ? '(錯題重測)' : '');
  document.getElementById('quizBar').style.width = (quiz.i / quiz.list.length * 100) + '%';
  document.getElementById('quizUnit').textContent = item.subjName + '.' + item.unitName + (item.semester === '8a' ? '(八上)' : item.semester === '8b' ? '(八下)' : '');
  document.getElementById('quizQ').textContent = item.q.q;
  const box = document.getElementById('quizOpts');
  box.textContent = '';
  const LABEL = ['A','B','C','D'];
  item.q.options.forEach((opt, idx) => {
    const b = document.createElement('button');
    b.className = 'opt';
    const tag = document.createElement('span'); tag.className = 'tag'; tag.textContent = LABEL[idx];
    const tx = document.createElement('span'); tx.textContent = opt;
    b.appendChild(tag); b.appendChild(tx);
    b.addEventListener('click', () => answer(idx));
    box.appendChild(b);
  });
  document.getElementById('quizExp').classList.add('hidden');
  document.getElementById('btnNext').classList.add('hidden');
}

function answer(idx){
  const item = quiz.list[quiz.i];
  const ok = idx === item.q.a;
  if(ok) quiz.correct++;
  quiz.answers.push({ item:item, picked:idx, ok:ok });
  Core.record(store, item, ok);
  saveStore();
  document.getElementById('quizBar').style.width = ((quiz.i + 1) / quiz.list.length * 100) + '%';
  const btns = document.querySelectorAll('#quizOpts .opt');
  btns.forEach((b, i) => {
    b.disabled = true;
    if(i === item.q.a) b.classList.add('correct');
    if(i === idx && !ok) b.classList.add('wrong');
  });
  const exp = document.getElementById('quizExp');
  exp.classList.remove('hidden');
  exp.innerHTML = '';
  const v = document.createElement('div');
  v.className = 'verdict ' + (ok ? 'ok' : 'ng');
  v.textContent = ok ? '答對了!' : '答錯了,正解是 ' + ['A','B','C','D'][item.q.a];
  const e = document.createElement('div');
  e.textContent = item.q.exp || '';
  exp.appendChild(v); exp.appendChild(e);
  const next = document.getElementById('btnNext');
  next.textContent = quiz.i + 1 >= quiz.list.length ? '看結果' : '下一題';
  next.classList.remove('hidden');
}
document.getElementById('btnNext').addEventListener('click', () => {
  quiz.i++;
  if(quiz.i >= quiz.list.length) finishQuiz(); else renderQuestion();
});

function finishQuiz(){
  clearInterval(quiz.timerId); quiz.timerId = 0;
  const sec = (Date.now() - quiz.t0) / 1000;
  show('result');
  document.getElementById('resScore').textContent = quiz.correct + ' / ' + quiz.list.length;
  document.getElementById('resMeta').textContent =
    '得分 ' + Math.round(quiz.correct / quiz.list.length * 100) + ' 分.用時 ' + fmtSec(sec);
  const rv = document.getElementById('resReview');
  rv.textContent = '';
  const LABEL = ['A','B','C','D'];
  quiz.answers.forEach((a, n) => {
    const d = document.createElement('div');
    d.className = 'review-item';
    const head = document.createElement('div');
    head.innerHTML = '<span class="' + (a.ok ? 'mark-ok' : 'mark-ng') + '">' + (a.ok ? '&#10003;' : '&#10007;') + '</span> ' +
      '<span class="pill">' + a.item.subjName + '.' + a.item.unitName + '</span>';
    const q = document.createElement('div'); q.className = 'rq'; q.textContent = (n + 1) + '. ' + a.item.q.q;
    const ans = document.createElement('div'); ans.className = 'ra';
    ans.textContent = (a.ok ? '' : '你的答案:' + LABEL[a.picked] + '. ' + a.item.q.options[a.picked] + '\n') +
      '正解:' + LABEL[a.item.q.a] + '. ' + a.item.q.options[a.item.q.a] +
      (a.item.q.exp ? '\n詳解:' + a.item.q.exp : '');
    d.appendChild(head); d.appendChild(q); d.appendChild(ans);
    rv.appendChild(d);
  });
}
document.getElementById('btnAgain').addEventListener('click', () => {
  if(quiz.retest){
    if(!wrongPool().length){
      alert('目前沒有錯題可以重測,先去測驗累積吧!');
      show('wrong');
      return;
    }
    retestWrong();
  } else {
    startQuiz(Core.buildPool(QB, [...selected]), false);
  }
});
document.getElementById('btnHome2').addEventListener('click', () => show('home'));

/* ---------- 錯題本 ---------- */
function wrongPool(){
  const pool = [];
  Object.keys(store.wrong).forEach(id => {
    const it = resolveQ(id);
    if(it) pool.push(it);
  });
  return pool;
}
function renderWrong(){
  const list = document.getElementById('wrongList');
  list.textContent = '';
  const pool = wrongPool()
    .sort((a, b) => (store.wrong[b.id].t || 0) - (store.wrong[a.id].t || 0));
  document.getElementById('btnRetestWrong').disabled = pool.length === 0;
  if(!pool.length){
    list.innerHTML = '<div class="empty">目前沒有錯題,太強了!</div>';
    return;
  }
  const LABEL = ['A','B','C','D'];
  pool.forEach(it => {
    const w = store.wrong[it.id];
    const d = document.createElement('div');
    d.className = 'wrong-item';
    const pills = document.createElement('div');
    pills.innerHTML = '<span class="pill">' + it.subjName + '</span>' +
      '<span class="pill">' + it.unitName + '</span>' +
      '<span class="pill">已連對 ' + (w.k || 0) + '/2</span>';
    const q = document.createElement('div'); q.className = 'wq'; q.textContent = it.q.q;
    const a = document.createElement('div'); a.className = 'wq';
    a.style.color = 'var(--good)'; a.style.marginTop = '4px'; a.style.fontSize = '.85rem';
    a.textContent = '正解:' + LABEL[it.q.a] + '. ' + it.q.options[it.q.a];
    d.appendChild(pills); d.appendChild(q); d.appendChild(a);
    list.appendChild(d);
  });
}
function retestWrong(){
  const pool = wrongPool();
  if(pool.length) startQuiz(pool, true);
}
document.getElementById('btnRetestWrong').addEventListener('click', retestWrong);

/* ---------- 統計 ---------- */
function renderStats(){
  const box = document.getElementById('statSubj');
  box.textContent = '';
  SUBJECTS.forEach(s => {
    const st = Core.subjectStats(store, s.key);
    const row = document.createElement('div');
    row.className = 'stat-row';
    row.innerHTML =
      '<span class="sname">' + s.name + '</span>' +
      '<span class="stat-bar"><i style="width:' + (st.rate || 0) + '%;background:' + s.color + '"></i></span>' +
      '<span class="stat-num">' + st.a + ' 題.' + (st.rate === null ? '--' : st.rate + '%') + '</span>';
    box.appendChild(row);
  });
  const weak = document.getElementById('statWeak');
  weak.textContent = '';
  const ws = Core.weakUnits(store, 3);
  if(!ws.length){
    weak.innerHTML = '<div class="empty">資料還不夠,多測幾回就會出現弱點分析</div>';
  } else {
    ws.forEach(u => {
      const d = document.createElement('div');
      d.className = 'stat-row';
      d.innerHTML =
        '<span style="flex:1;font-size:.95rem"><span class="pill">' + subjName(u.s) + '</span>' + unitName(u.id) + '</span>' +
        '<span class="stat-num" style="color:var(--bad)">錯 ' + Math.round(u.err * 100) + '%(' + (u.a - u.c) + '/' + u.a + ')</span>';
      weak.appendChild(d);
    });
  }
  document.getElementById('verLine').textContent = '國二五科複習快測 v' + APP_VERSION;
}

/* ---------- PWA ---------- */
if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}

renderHome();
show('home');
